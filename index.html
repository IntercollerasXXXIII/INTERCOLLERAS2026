<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Intercolleras Prom XXXIII</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* Paleta azul oscuro — modo oscuro elegante */
    --green:#1b3a5c;        /* azul oscuro (reemplaza al verde) */
    --green-deep:#0f2440;
    --green-soft:#2d567f;
    --blue-text:#6b9bd1;    /* azul claro para textos sobre oscuro */
    --gold:#c9a227;         /* dorado apagado */
    --gold-bright:#e0b73a;
    --burgundy:#7a2d42;

    --bg:#0a0e14;           /* negro azulado de fondo */
    --bg2:#0f141d;
    --panel:#141a25;        /* paneles oscuros */
    --panel2:#1a212e;
    --line:rgba(255,255,255,.08);
    --line2:rgba(255,255,255,.16);
    --ink:#e8ecf2;          /* texto claro */
    --muted:#8b94a6;
    --muted2:#5a6478;
    --red:#c1444a;
    --turq:#1b3a5c;
    --coral:#7a2d42;
    --purple:#1b3a5c;
    --lime:#c9a227;
    --bg-dark:#0f2440;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:'Manrope',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--gold);color:#0a0e14}

  /* ===== TOPBAR ===== */
  .topbar{position:sticky;top:0;z-index:100;background:var(--green);border-bottom:3px solid var(--gold)}
  .topbar-inner{max-width:1080px;margin:0 auto;display:flex;align-items:center;gap:16px;padding:13px 22px}
  .logo{display:flex;align-items:center;gap:13px;flex-shrink:0}
  .logo-img{width:46px;height:46px;border-radius:50%;background:#0a0e14 center/cover no-repeat;box-shadow:0 0 0 2px var(--gold)}
  .logo-text h1{font-family:'Barlow Condensed';font-weight:800;font-size:21px;letter-spacing:.04em;line-height:1;text-transform:uppercase;color:#f3efe6}
  .logo-text span{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.3em;color:var(--gold-bright)}
  .nav{display:flex;gap:2px;margin-left:auto;flex-wrap:wrap}
  .nav button{font-family:'Manrope';font-weight:700;font-size:13px;letter-spacing:.01em;padding:9px 15px;border-radius:9px;border:none;cursor:pointer;background:transparent;color:rgba(243,239,230,.7);transition:all .2s}
  .nav button:hover{color:#f3efe6;background:rgba(255,255,255,.1)}
  .nav button.active{color:var(--green);background:var(--gold-bright)}

  .container{max-width:1080px;margin:0 auto;padding:30px 22px 80px}
  .view{display:none}
  .view.active{display:block;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  .section-head{margin-bottom:24px}
  .section-head h2{font-family:'Barlow Condensed';font-weight:800;font-size:46px;letter-spacing:.01em;line-height:.92;text-transform:uppercase}
  .section-head .sub{font-family:'JetBrains Mono';font-size:11px;letter-spacing:.18em;color:var(--muted);margin-top:5px;text-transform:uppercase}

  /* ===== SCOREBOARD BAR (estilo oficial FIFA 2026 - sobrio) ===== */
  .scorebar{
    position:relative;display:flex;align-items:stretch;
    background:linear-gradient(180deg,#1b3a5c,#0f2440);
    border-radius:13px;overflow:hidden;margin-bottom:11px;cursor:pointer;
    border:1px solid var(--line);
    transition:all .2s ease;
  }
  .scorebar:hover{border-color:var(--line2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(27,67,50,.18)}
  /* Filo dorado sutil arriba y abajo (en vez de arcoíris neón) */
  .scorebar::before{content:'';position:absolute;left:0;right:0;top:0;height:2px;background:var(--gold)}
  .scorebar::after{content:'';position:absolute;left:0;right:0;bottom:0;height:2px;background:rgba(176,141,58,.5)}
  .sb-side{display:flex;align-items:center;gap:11px;flex:1 1 0;min-width:0;padding:15px 18px;color:#f3efe6}
  .sb-side.left{justify-content:flex-end}
  .sb-side .flag{font-size:26px;line-height:1;flex-shrink:0}
  .sb-side .kit{width:9px;height:9px;border-radius:50%;box-shadow:0 0 0 1.5px rgba(255,255,255,.3);flex-shrink:0}
  .sb-side .abbr{font-family:'Barlow Condensed';font-weight:700;font-size:21px;letter-spacing:.04em;text-transform:uppercase;flex-shrink:0}
  .sb-side .full{font-family:'Manrope';font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .sb-mid{display:flex;align-items:center;justify-content:center;gap:2px;padding:0 4px;background:var(--green-deep);position:relative;flex-shrink:0}
  .sb-num{font-family:'Barlow Condensed';font-weight:800;font-size:30px;min-width:34px;text-align:center;line-height:1;color:var(--gold-bright)}
  .sb-logo{width:30px;height:30px;border-radius:6px;background:transparent center/contain no-repeat;margin:0 3px;flex-shrink:0}
  .sb-vs{font-family:'Barlow Condensed';font-weight:700;font-size:18px;color:rgba(243,239,230,.6);padding:0 14px}
  .sb-clock{display:flex;align-items:center;justify-content:center;width:64px;flex-shrink:0;padding:0 8px;background:var(--gold);color:#fff;font-family:'JetBrains Mono';font-weight:700;font-size:12px;letter-spacing:.02em}
  .sb-clock.pending{background:rgba(243,239,230,.15);color:rgba(243,239,230,.7)}

  .sb-status-row{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.12em;color:var(--muted2);text-transform:uppercase;margin:-4px 0 12px;padding-left:4px}

  /* ===== HERO ===== */
  .hero{position:relative;border-radius:18px;overflow:hidden;padding:44px;margin-bottom:24px;background:linear-gradient(135deg,#1b3a5c,#0a0e14);border:1px solid var(--line2)}
  .hero::before{content:'';position:absolute;left:0;right:0;top:0;height:3px;background:var(--gold)}
  .hero-inner{display:flex;align-items:center;justify-content:space-between;gap:32px}
  .hero-text{flex:1;min-width:0}
  .hero-logo{flex-shrink:0;width:170px;height:170px;border-radius:50%;background:#0a0e14 center/cover no-repeat;box-shadow:0 0 0 3px var(--gold),0 8px 30px rgba(0,0,0,.3)}
  .hero h2{font-family:'Barlow Condensed';font-weight:800;font-size:64px;line-height:.9;letter-spacing:.01em;text-transform:uppercase;margin-bottom:12px;color:#f3efe6}
  .hero h2 .accent{color:var(--gold-bright)}
  .hero p{color:rgba(243,239,230,.8);font-size:15px;max-width:520px;font-weight:500}
  .hero-stats{display:flex;gap:12px;margin-top:24px;flex-wrap:wrap}
  .hstat{background:rgba(255,255,255,.08);border-radius:11px;padding:13px 20px;border:1px solid rgba(255,255,255,.12);position:relative;overflow:hidden}
  .hstat::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
  .hstat .n{font-family:'Barlow Condensed';font-weight:800;font-size:30px;line-height:1;color:#f3efe6}
  .hstat .l{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.1em;color:rgba(243,239,230,.65);text-transform:uppercase;margin-top:3px}

  .dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:15px;overflow:hidden;box-shadow:0 2px 10px rgba(27,67,50,.05)}
  .card-pad{padding:22px}
  .card h3{font-family:'Barlow Condensed';font-weight:700;font-size:17px;letter-spacing:.04em;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:9px;color:var(--blue-text)}
  .card h3 .dot{width:7px;height:7px;border-radius:50%}

  /* ===== GOL DE LA FECHA ===== */
  .gol-feature{display:flex;align-items:center;gap:22px;padding:8px 4px}
  .gol-ball{font-size:54px;flex-shrink:0;filter:drop-shadow(0 3px 6px rgba(27,67,50,.25))}
  .gol-info{min-width:0}
  .gol-tag{font-family:'JetBrains Mono';font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:5px}
  .gol-name{font-family:'Barlow Condensed';font-weight:800;font-size:34px;line-height:.95;text-transform:uppercase;color:var(--ink)}
  .gol-team{font-family:'Manrope';font-weight:600;font-size:14px;color:var(--muted);margin-top:5px}

  /* ===== INSTAGRAM ===== */
  .insta-profile{display:flex;align-items:center;gap:16px;text-decoration:none;background:linear-gradient(135deg,#1b3a5c,#0f2440);border:1px solid var(--line2);border-radius:14px;padding:18px 22px;margin-bottom:22px;transition:all .2s}
  .insta-profile:hover{border-color:var(--gold);transform:translateY(-2px)}
  .insta-profile .ig-ico{font-size:34px}
  .insta-profile .ig-txt{display:flex;flex-direction:column}
  .insta-profile .ig-txt b{font-family:'Barlow Condensed';font-weight:800;font-size:22px;letter-spacing:.02em;color:#e8ecf2;text-transform:uppercase}
  .insta-profile .ig-txt span{font-family:'Manrope';font-size:13px;color:var(--gold-bright);font-weight:600}
  .insta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;justify-items:center}
  .insta-empty{text-align:center;color:var(--muted);padding:50px;font-style:italic;background:var(--panel);border:1px solid var(--line);border-radius:14px}

  /* ===== BRACKET (Eliminatorias) ===== */
  .ic-bracket-wrap{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;margin-top:8px}
  .ic-bracket-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .ic-bracket-svg{display:block;width:100%;min-width:1024px;height:auto}
  .ic-bracket-hint{display:none;text-align:center;color:var(--blue-text);font-size:12px;padding:8px 0 12px;letter-spacing:.5px}
  @media (max-width:1080px){ .ic-bracket-hint{display:block} }

  /* Admin del bracket */
  .br-block{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px;margin-bottom:14px}
  .br-block h4{font-family:'Barlow Condensed';font-weight:700;font-size:15px;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
  .br-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:9px 12px;border-radius:9px;background:var(--bg2);border:1px solid var(--line);margin-bottom:6px}
  .br-row.done{border-left:3px solid var(--gold)}
  .br-match{font-family:'Manrope';font-weight:600;font-size:13px;display:flex;align-items:center;gap:8px}
  .br-match .tag{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--blue-text);background:rgba(107,155,209,.12);padding:3px 7px;border-radius:5px;margin-right:4px}
  .br-sel{padding:9px 12px;border-radius:9px;border:1px solid var(--line2);background:var(--bg2);color:var(--ink);font-family:'Manrope';font-size:13px;min-width:180px}
  .br-sel:focus{outline:none;border-color:var(--gold)}
  .br-controls{display:flex;align-items:center;gap:14px;flex-wrap:wrap;justify-content:flex-end}
  .br-pen{display:inline-flex;align-items:center;gap:6px;font-family:'Manrope';font-size:12px;color:var(--muted);cursor:pointer;white-space:nowrap}
  .br-pen input[type="checkbox"]{accent-color:var(--gold);cursor:pointer;width:14px;height:14px}
  .br-pen input[type="checkbox"]:disabled{cursor:not-allowed;opacity:.4}
  /* Inputs de marcador en Admin */
  .br-row{align-items:flex-start}
  .br-score{display:flex;flex-direction:column;gap:6px;align-items:flex-end;min-width:300px}
  .br-line{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .br-mini{font-family:'Manrope';font-weight:600;font-size:11px;color:var(--muted);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .br-num{width:42px;padding:6px 4px;border-radius:7px;border:1px solid var(--line2);background:var(--bg2);color:var(--ink);font-family:'Barlow Condensed';font-weight:800;font-size:17px;text-align:center}
  .br-num:focus{outline:none;border-color:var(--gold)}
  .br-num.br-pen{border-color:rgba(201,162,39,.4)}
  .br-sep{font-family:'Barlow Condensed';font-weight:700;font-size:17px;color:var(--muted)}
  .br-pen-label{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-right:2px}
  .br-winner{font-family:'Manrope';font-size:12px;color:var(--gold-bright);font-weight:700;margin-top:2px}
  .br-winner b{color:var(--ink);font-weight:800}
  .pen-tag{font-size:10px;color:var(--gold-bright);font-weight:700}
  .br-tie{font-family:'Manrope';font-size:12px;color:#d97b7b;font-weight:600;margin-top:2px}
  @media(max-width:760px){
    .br-row{grid-template-columns:1fr;gap:8px}
    .br-score{min-width:0;align-items:stretch;width:100%}
    .br-line{justify-content:space-between}
  }

  /* ===== EDITOR DE DÍAS ===== */
  .sched-row{display:grid;grid-template-columns:1fr 150px 150px;gap:12px;align-items:center;padding:12px 16px;border-radius:12px;background:var(--panel);border:1px solid var(--line);margin-bottom:6px}
  .sched-match{font-family:'Manrope';font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .sched-tag{font-family:'JetBrains Mono';font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);background:rgba(201,162,39,.12);padding:3px 7px;border-radius:5px}
  .sched-dia,.sched-rec{padding:10px;border-radius:9px;border:1px solid var(--line2);background:var(--bg2);color:var(--ink);font-family:'Manrope';font-size:13px}
  .sched-dia:focus,.sched-rec:focus{outline:none;border-color:var(--gold)}
  @media(max-width:760px){.sched-row{grid-template-columns:1fr;gap:8px}}

  /* ===== TABLA ===== */
  .table-wrap{background:var(--panel);border:1px solid var(--line);border-radius:15px;overflow:hidden;box-shadow:0 2px 10px rgba(27,67,50,.05)}
  table{width:100%;border-collapse:collapse}
  .standings thead th{font-family:'Manrope';font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:#f3efe6;padding:15px 9px;text-align:center;background:var(--green);border-bottom:2px solid var(--gold)}
  .standings thead th.team-col{text-align:left;padding-left:22px}
  .standings tbody td{padding:13px 9px;text-align:center;border-bottom:1px solid var(--line)}
  .standings tbody tr:hover{background:var(--panel2)}
  .standings .pos{font-family:'Barlow Condensed';font-weight:700;font-size:18px;color:var(--muted);width:42px;position:relative}
  .standings tbody tr:nth-child(-n+4) .pos{color:var(--blue-text)}
  .standings tbody tr:nth-child(-n+4) .pos::before{content:'';position:absolute;left:0;top:22%;height:56%;width:2px;background:var(--gold)}
  .standings .team-cell{display:flex;align-items:center;gap:13px;text-align:left;padding-left:12px;cursor:pointer}
  .standings .team-cell .flag{font-size:23px}
  .standings .team-cell .name{font-family:'Manrope';font-weight:700;font-size:15px}
  .standings .team-cell:hover .name{color:var(--blue-text)}
  .standings .pts{font-family:'Barlow Condensed';font-weight:800;font-size:20px;color:var(--gold)}
  .standings td.gd-pos{color:var(--green);font-weight:700}
  .standings td.gd-neg{color:var(--red);font-weight:700}
  .legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:14px;font-family:'JetBrains Mono';font-size:10px;letter-spacing:.06em;color:var(--muted)}
  .legend b{color:var(--ink)}

  /* ===== FIXTURE ===== */
  .fecha-group{margin-bottom:28px}
  .fecha-head{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .fecha-head .ft{font-family:'Barlow Condensed';font-weight:800;font-size:24px;letter-spacing:.03em;text-transform:uppercase}
  .fecha-head .badge{font-family:'JetBrains Mono';font-size:9px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.08em;text-transform:uppercase}
  .badge-live{background:var(--green);color:#f3efe6}
  .badge-pend{background:var(--panel2);color:var(--muted);border:1px solid var(--line2)}
  .day-sub{font-family:'Manrope';font-weight:700;font-size:13px;color:var(--blue-text);letter-spacing:.05em;text-transform:uppercase;margin:14px 0 8px;display:flex;align-items:center;gap:8px}
  .day-sub::before{content:'';width:4px;height:14px;background:var(--gold);border-radius:2px}
  .fecha-head .ft{color:var(--blue-text)}

  /* ===== EQUIPOS ===== */
  .teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px}
  .team-card{position:relative;cursor:pointer;border-radius:14px;overflow:hidden;padding:22px 18px;background:var(--panel);border:1px solid var(--line);transition:all .2s}
  .team-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tc)}
  .team-card:hover{transform:translateY(-3px);border-color:var(--line2);background:var(--panel2)}
  .team-card .flag{font-size:50px;line-height:1}
  .team-card .name{font-family:'Barlow Condensed';font-weight:800;font-size:23px;letter-spacing:.02em;text-transform:uppercase;margin-top:10px;line-height:.95;color:var(--blue-text)}
  .team-card .cap{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.08em;color:var(--muted);margin-top:5px}
  .team-card .count{margin-top:11px;font-family:'Manrope';font-weight:700;font-size:12px;color:var(--muted)}

  /* ===== JUGADORES / MVP ===== */
  .mvp-tabs{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap}
  .mvp-tabs button{font-family:'Manrope';font-weight:700;font-size:13px;padding:10px 20px;border-radius:9px;border:1px solid var(--line2);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
  .mvp-tabs button.active{background:var(--green);color:#f3efe6;border-color:var(--green)}
  .mvp-list{display:flex;flex-direction:column;gap:11px}
  .mvp-row{
    position:relative;display:flex;align-items:center;gap:18px;
    background:var(--panel);border:1px solid var(--line);border-radius:13px;
    padding:18px 22px;overflow:hidden;box-shadow:0 2px 10px rgba(27,67,50,.05);
  }
  .mvp-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold)}
  .mvp-row .mvp-match-info{flex:1;min-width:0}
  .mvp-row .mm-label{font-family:'JetBrains Mono';font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:7px}
  .mvp-row .mm-teams{font-family:'Barlow Condensed';font-weight:700;font-size:19px;letter-spacing:.02em;text-transform:uppercase;display:flex;align-items:center;gap:9px;flex-wrap:wrap;color:var(--ink)}
  .mvp-row .mm-teams .sc{color:var(--gold)}
  .mvp-row .mm-teams .vs{color:var(--muted);font-size:14px}
  .mvp-divider{width:1px;align-self:stretch;background:var(--line2);margin:0 4px}
  .mvp-player{display:flex;align-items:center;gap:15px;min-width:0}
  .mvp-player .num{font-family:'Barlow Condensed';font-weight:800;font-size:40px;color:var(--blue-text);line-height:.85;flex-shrink:0}
  .mvp-player .pinfo{min-width:0}
  .mvp-player .star{font-family:'JetBrains Mono';font-size:8px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:2px}
  .mvp-player .nick{font-family:'Barlow Condensed';font-weight:800;font-size:22px;letter-spacing:.02em;text-transform:uppercase;line-height:1;white-space:nowrap;color:var(--ink)}
  .mvp-player .full{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .mvp-player .tm{font-family:'Manrope';font-weight:600;font-size:11px;color:var(--blue-text);margin-top:4px;display:flex;align-items:center;gap:5px}
  .mvp-empty{text-align:center;color:var(--muted);padding:50px;font-style:italic}

  /* ===== ADMIN ===== */
  .admin-note{background:var(--panel);border:1px solid var(--line2);border-left:3px solid var(--green);border-radius:12px;padding:16px 20px;margin-bottom:22px;font-size:14px;font-weight:500;color:var(--ink)}
  .admin-actions{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
  .btn{font-family:'Manrope';font-weight:700;font-size:14px;padding:12px 22px;border-radius:10px;border:none;cursor:pointer;transition:all .2s}
  .btn-light{background:var(--green);color:#f3efe6}
  .btn-light:hover{transform:translateY(-2px)}
  .btn-ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line2)}
  .btn-red{background:var(--red);color:#fff}
  .admin-match{display:grid;grid-template-columns:1fr 60px 24px 60px 1fr auto;gap:13px;align-items:center;padding:15px 18px;border-radius:12px;background:var(--panel);border:1px solid var(--line);margin-bottom:6px}
  .am-team{font-family:'Manrope';font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
  .am-team.right{justify-content:flex-end;text-align:right}
  .admin-match input{width:100%;padding:11px;border-radius:9px;border:1px solid var(--line2);background:var(--bg2);color:var(--ink);text-align:center;font-family:'Barlow Condensed';font-weight:800;font-size:20px}
  .admin-match input:focus{outline:none;border-color:var(--green)}
  .am-vs{text-align:center;color:var(--muted);font-family:'JetBrains Mono';font-size:11px;font-weight:700}
  .btn-save{font-family:'Manrope';font-weight:700;font-size:13px;padding:10px 16px;border-radius:9px;border:none;cursor:pointer;background:var(--green);color:#f3efe6;transition:all .2s}
  .btn-save.saved{background:var(--gold);color:#fff}
  .match-meta-line{font-family:'JetBrains Mono';font-size:9px;color:var(--muted);text-align:center;margin:-2px 0 12px;letter-spacing:.06em;text-transform:uppercase}
  .mvp-admin-row{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:center;padding:14px 18px;border-radius:12px;background:var(--panel);border:1px solid var(--line);margin-bottom:8px}
  .mvp-admin-row.has-mvp{border-left:3px solid var(--gold)}
  .mvp-admin-info{font-family:'Manrope';font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px}
  .mvp-admin-info .vs{color:var(--muted);font-weight:400;margin:0 4px}
  .mvp-admin-info .meta{display:block;font-family:'JetBrains Mono';font-size:9px;color:var(--muted);font-weight:400;margin-top:3px;letter-spacing:.06em}
  .mvp-select{padding:11px 14px;border-radius:9px;border:1px solid var(--line2);background:var(--bg2);color:var(--ink);font-family:'Manrope';font-weight:600;font-size:13px;min-width:230px}
  .mvp-select:focus{outline:none;border-color:var(--gold)}

  /* ===== MODAL ===== */
  .modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(18,45,33,.7);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:22px}
  .modal-overlay.show{display:flex;animation:fade .3s ease}
  .modal{background:var(--panel);border:1px solid var(--line2);border-radius:18px;max-width:560px;width:100%;max-height:86vh;overflow-y:auto;position:relative}
  .modal::before{content:'';position:absolute;left:0;right:0;top:0;height:3px;background:var(--gold);border-radius:18px 18px 0 0}
  .modal-header{padding:30px}
  .modal-header .flag{font-size:60px;line-height:1}
  .modal-header h2{font-family:'Barlow Condensed';font-weight:800;font-size:40px;letter-spacing:.02em;text-transform:uppercase;margin-top:8px;color:var(--blue-text)}
  .modal-header .cap{font-family:'JetBrains Mono';font-size:11px;color:var(--gold);letter-spacing:.1em;margin-top:5px}
  .modal-close{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;border:1px solid var(--line2);background:var(--bg2);color:var(--ink);font-size:17px;cursor:pointer;transition:all .2s;z-index:2}
  .modal-close:hover{background:var(--red);border-color:var(--red);color:#fff}
  .modal-body{padding:0 28px 28px}
  .modal-body h3{font-family:'Barlow Condensed';font-weight:700;font-size:16px;letter-spacing:.05em;text-transform:uppercase;color:var(--blue-text);margin:20px 0 12px}
  .roster-row{display:grid;grid-template-columns:42px 1fr auto;gap:14px;align-items:center;padding:10px 14px;border-radius:9px;background:var(--bg2);margin-bottom:6px}
  .roster-row .rn{font-family:'Barlow Condensed';font-weight:800;font-size:20px;color:var(--blue-text);text-align:center}
  .roster-row .nick{font-family:'Manrope';font-weight:700;font-size:15px}
  .roster-row .full{font-size:11px;color:var(--muted)}
  .roster-row .rg{font-family:'JetBrains Mono';font-size:10px;color:var(--turq);background:rgba(30,224,197,.1);padding:4px 8px;border-radius:6px}
  .modal-match{display:flex;align-items:center;justify-content:space-between;padding:12px 15px;border-radius:9px;background:var(--bg2);margin-bottom:6px;font-size:14px}
  .modal-match .mm-rival{font-family:'Manrope';font-weight:700;display:flex;align-items:center;gap:8px}
  .modal-match .mm-result{font-family:'Barlow Condensed';font-weight:800;font-size:20px;color:var(--gold)}
  .modal-match .mm-when{font-family:'JetBrains Mono';font-size:9px;color:var(--muted)}

  .foot{text-align:center;padding:32px;color:var(--muted2);font-family:'JetBrains Mono';font-size:10px;letter-spacing:.16em;border-top:1px solid var(--line);margin-top:40px}

  @media (max-width:760px){
    .dash-grid{grid-template-columns:1fr}
    .hero h2{font-size:42px}
    .hero-inner{flex-direction:column-reverse;gap:20px;text-align:center}
    .hero-logo{width:110px;height:110px}
    .hero p{margin:0 auto}
    .hero-stats{justify-content:center}
    .section-head h2{font-size:32px}
    .admin-match{grid-template-columns:1fr 44px 16px 44px 1fr;gap:7px}
    .admin-match .btn-save{grid-column:1/-1;margin-top:8px}
    .mvp-admin-row{grid-template-columns:1fr}
    .mvp-select{min-width:0;width:100%}
    .mvp-row{flex-direction:column;align-items:stretch;gap:14px}
    .mvp-divider{width:100%;height:1px;margin:0}
    .nav button{padding:8px 11px;font-size:12px}
    .sb-side .full{display:none}
    .hide-mobile{display:none}
  }
  @media (min-width:761px){ .sb-side .abbr{display:none} }
  /* Modo compacto (cards del dashboard): siempre abreviatura */
  .sb-compact .full{display:none}
  .sb-compact .abbr{display:inline !important}

let db=null, useFirebase=false, fbInitialLoad=true;
function initFirebase(){
  if(!firebaseConfig.databaseURL){ useFirebase=false; return; }
  try{
    firebase.initializeApp(firebaseConfig);
    db=firebase.database();
    useFirebase=true;
    // Google Analytics — registra visitas y eventos
    try{
      if(firebase.analytics && firebaseConfig.measurementId){
        firebase.analytics();
      }
    }catch(ae){ console.warn('Analytics no disponible',ae); }
  }catch(e){ console.error('Firebase init error',e); useFirebase=false; }
}

// Nodo único en Realtime Database: torneo/datos = { results, mvps, golfecha }
function subscribeFirebase(){
  if(!useFirebase) return;
  db.ref('torneo/datos').on('value', snap=>{
    const d=snap.val();
    if(d){
      RESULTS = d.results || {};
      MVPS = d.mvps || {};
      GOLFECHA = d.golfecha || {};
      INSTAPOSTS = d.instaposts || [];
      SCHEDULE = d.schedule || {};
      if(d.bracket){ BRACKET_RES = d.bracket; }
      if(d.bracketPens){ BRACKET_PENS = d.bracketPens; }
      if(d.bracketScores){
        BRACKET_SCORES = d.bracketScores;
        // Firebase puede serializar arrays vacíos como undefined
        if(!Array.isArray(BRACKET_SCORES.playoffs)) BRACKET_SCORES.playoffs=[null,null,null,null];
        if(!Array.isArray(BRACKET_SCORES.qf)) BRACKET_SCORES.qf=[null,null,null,null];
        if(!Array.isArray(BRACKET_SCORES.sf)) BRACKET_SCORES.sf=[null,null];
        recomputeWinners();
      }
    } else {
      // primera vez: sembrar con los resultados por defecto
      RESULTS = Object.assign({}, DEFAULT_RESULTS);
      MVPS = {};
      GOLFECHA = {};
      INSTAPOSTS = DEFAULT_INSTA.slice();
      SCHEDULE = {};
      pushFirebase();
    }
    // respaldo local + re-render de la vista activa
    try{ localStorage.setItem(LS_RESULTS,JSON.stringify(RESULTS)); localStorage.setItem(LS_MVPS,JSON.stringify(MVPS)); localStorage.setItem(LS_GOL,JSON.stringify(GOLFECHA)); localStorage.setItem(LS_INSTA,JSON.stringify(INSTAPOSTS)); localStorage.setItem(LS_SCHED,JSON.stringify(SCHEDULE)); }catch(e){}
    rerenderActive();
  }, err=>{ console.error('RTDB read error',err); });
}
function pushFirebase(){
  if(!useFirebase) return Promise.resolve();
  return db.ref('torneo/datos').set({results:RESULTS, mvps:MVPS, golfecha:GOLFECHA, instaposts:INSTAPOSTS, schedule:SCHEDULE, bracket:BRACKET_RES, bracketPens:BRACKET_PENS, bracketScores:BRACKET_SCORES, updated:Date.now()})
    .catch(e=>console.error('RTDB write error',e));
}

function getEq(n){return DATA.equipos.find(e=>e.nombre===n)}
function bandera(n){const e=getEq(n);return e?e.bandera:'🏳️'}
function color(n){const e=getEq(n);return e?e.color:'#444'}
function abbr(n){return n.slice(0,3).toUpperCase()}
function jugado(id){return RESULTS[id]&&RESULTS[id].golL!=null&&RESULTS[id].golV!=null}
// Día/recreo: si está editado en Admin (SCHEDULE) usa eso; si no, el del fixture base
function diaDe(m){ const s=SCHEDULE[m.id]; return (s&&s.dia)?s.dia:(m.dia||''); }
function recreoDe(m){ const s=SCHEDULE[m.id]; return (s&&s.recreo)?s.recreo:(m.recreo||''); }

function calcStandings(){
  const t={};DATA.equipos.forEach(e=>{t[e.nombre]={nombre:e.nombre,pj:0,pg:0,pe:0,pp:0,gf:0,gc:0,pts:0}});
  DATA.fixture.forEach(m=>{if(!jugado(m.id))return;const r=RESULTS[m.id],L=t[m.local],V=t[m.visitante];if(!L||!V)return;
    L.pj++;V.pj++;L.gf+=r.golL;L.gc+=r.golV;V.gf+=r.golV;V.gc+=r.golL;
    if(r.golL>r.golV){L.pg++;L.pts+=3;V.pp++}else if(r.golL<r.golV){V.pg++;V.pts+=3;L.pp++}else{L.pe++;V.pe++;L.pts++;V.pts++}});
  const a=Object.values(t);a.forEach(x=>x.dg=x.gf-x.gc);
  a.sort((x,y)=>y.pts-x.pts||y.dg-x.dg||y.gf-x.gf||x.nombre.localeCompare(y.nombre));return a;
}

// ===== SCOREBAR (estilo FIFA 2026 sobrio) =====
function scorebar(m, compact){
  const r=RESULTS[m.id],done=jugado(m.id);
  const clock=m.inaugural&&!done?'INAUG':(done?'FIN':(diaDe(m)?diaDe(m).slice(0,3).toUpperCase():'TBD'));
  return `<div class="scorebar${compact?' sb-compact':''}" onclick="openMatch(${m.id})">
    <div class="sb-side left">
      <span class="full">${m.local.toUpperCase()}</span>
      <span class="abbr">${abbr(m.local)}</span>
      <span class="kit" style="background:${color(m.local)}"></span>
      <span class="flag">${bandera(m.local)}</span>
    </div>
    <div class="sb-mid">
      ${done?`<span class="sb-num">${r.golL}</span>`:''}
      <span class="sb-logo" style="background-image:url('${LOGO_URL}')"></span>
      ${done?`<span class="sb-num">${r.golV}</span>`:`<span class="sb-vs">VS</span>`}
    </div>
    <div class="sb-side">
      <span class="flag">${bandera(m.visitante)}</span>
      <span class="kit" style="background:${color(m.visitante)}"></span>
      <span class="abbr">${abbr(m.visitante)}</span>
      <span class="full">${m.visitante.toUpperCase()}</span>
    </div>
    <div class="sb-clock ${done?'':'pending'}">${clock}</div>
  </div>`;

function renderFixture(){
  const fecha1=DATA.fixture.filter(m=>m.fecha===1);
  const pend=DATA.fixture.filter(m=>m.fecha!==1);

  // Agrupa una lista de partidos por día (ordenado), recreo dentro, y TBD al final
  function agrupar(lista){
    const conDia=lista.filter(m=>diaDe(m)).sort((a,b)=>ordenPartido(a)-ordenPartido(b));
    const sinDia=lista.filter(m=>!diaDe(m));
    let html='';
    const dias=[...new Set(conDia.map(m=>diaDe(m)))];
    dias.forEach(dia=>{
      const dd=conDia.filter(m=>diaDe(m)===dia);
      const recreos=[...new Set(dd.map(m=>recreoDe(m)))].sort((a,b)=>(ORDEN_RECREO[a]||9)-(ORDEN_RECREO[b]||9));
      html+=`<div class="day-sub">${dia}</div>`;
      recreos.forEach(rec=>{ dd.filter(m=>recreoDe(m)===rec).forEach(m=>html+=scorebar(m)); });
    });
    if(sinDia.length){
      html+=`<div class="day-sub" style="color:var(--muted)">Por programar</div>`;
      sinDia.forEach(m=>html+=scorebar(m));
    }
    return html;
  }

  document.getElementById('view-fixture').innerHTML=`
    <div class="section-head"><h2>Fixture</h2><div class="sub">24 partidos · 3 fechas</div></div>
    <div class="fecha-group"><div class="fecha-head"><span class="ft">Fecha 1</span><span class="badge badge-live">Programada</span></div>${agrupar(fecha1)}</div>

}

let mvpFecha=1;
// Orden cronológico de días y recreos
const ORDEN_DIA={'Lunes':1,'Martes':2,'Miércoles':3,'Jueves':4,'Viernes':5,'Sábado':6,'Domingo':7};
const ORDEN_RECREO={'1er Recreo':1,'2do Recreo':2,'3er Recreo':3};
function ordenDia(d){
  if(!d)return 9999;  // sin día → al final
  // extraer nombre del día (ej "Martes 19" -> "Martes")
  const nombre=d.split(' ')[0];
  const num=parseInt((d.match(/\d+/)||[0])[0]);
  return (ORDEN_DIA[nombre]||50)*100 + (isNaN(num)?0:num);
}
function ordenPartido(m){
  // Partidos sin programar (sin día) van al final
  if(!diaDe(m)) return 999999;
  return ordenDia(diaDe(m))*10 + (ORDEN_RECREO[recreoDe(m)]||9);
}

function scoreFields(level, idx, nameA, nameB){
  const s = (level==='final' ? BRACKET_SCORES.final : (BRACKET_SCORES[level]||[])[idx]) || {};
  const valA = s.a!=null?s.a:'', valB = s.b!=null?s.b:'';
  const valPA = s.penA!=null?s.penA:'', valPB = s.penB!=null?s.penB:'';
  const r = _scoreWinner(s);
  const tied = (valA!=='' && valB!=='' && Number(valA)===Number(valB));
  let lbl = '';
  if(r.winner){
    const wn = r.winner==='a' ? nameA : nameB;
    lbl = '<div class="br-winner">→ Avanza: <b>'+wn+'</b>'+(r.byPens?' <span class="pen-tag">(Pen.)</span>':'')+'</div>';
  } else if(tied){
    lbl = '<div class="br-tie">⚠️ Empate — completa los penales</div>';
  }
  const oninp = 'onScoreInput(\''+level+'\','+idx+')';
  const penDisplay = tied ? 'flex' : 'none';
  return '<div class="br-score" data-level="'+level+'" data-idx="'+idx+'">'+
    '<div class="br-line">'+
      '<span class="br-mini">'+nameA+'</span>'+
      '<input type="number" min="0" max="99" class="br-num" value="'+valA+'" placeholder="-" data-fld="a" oninput="'+oninp+'">'+
      '<span class="br-sep">–</span>'+
      '<input type="number" min="0" max="99" class="br-num" value="'+valB+'" placeholder="-" data-fld="b" oninput="'+oninp+'">'+
      '<span class="br-mini">'+nameB+'</span>'+
    '</div>'+
    '<div class="br-line br-pen-line" style="display:'+penDisplay+'">'+
      '<span class="br-pen-label">Penales:</span>'+
      '<input type="number" min="0" max="99" class="br-num br-pen" value="'+valPA+'" placeholder="-" data-fld="penA" oninput="'+oninp+'">'+
      '<span class="br-sep">–</span>'+
      '<input type="number" min="0" max="99" class="br-num br-pen" value="'+valPB+'" placeholder="-" data-fld="penB" oninput="'+oninp+'">'+
    '</div>'+
    lbl+
  '</div>';
}

function onScoreInput(level, idx){
  const root = document.querySelector('.br-score[data-level="'+level+'"][data-idx="'+idx+'"]');
  if(!root) return;
  const get = fld => { const el=root.querySelector('[data-fld="'+fld+'"]'); return (el && el.value!=='') ? el.value : null; };
  const score = { a:get('a'), b:get('b'), penA:get('penA'), penB:get('penB') };
  const prev = (level==='final' ? BRACKET_RES.final : BRACKET_RES[level][idx]);
  if(level==='final') BRACKET_SCORES.final = score;
  else BRACKET_SCORES[level][idx] = score;
  recomputeWinners();
  const curr = (level==='final' ? BRACKET_RES.final : BRACKET_RES[level][idx]);
  try{ localStorage.setItem('intercolleras_bracket_scores_v1', JSON.stringify(BRACKET_SCORES)); }catch(e){}
  try{ localStorage.setItem('intercolleras_bracket_v1', JSON.stringify(BRACKET_RES)); }catch(e){}
  try{ localStorage.setItem('intercolleras_bracket_pens_v1', JSON.stringify(BRACKET_PENS)); }catch(e){}
  pushFirebase();
  // Si el ganador cambió, re-renderizar admin (con pequeño retardo para no perder foco si sigue escribiendo)
  if(prev !== curr){
    clearTimeout(window._brTO);
    window._brTO = setTimeout(()=>{
      if(document.activeElement && document.activeElement.closest('.br-score[data-level="'+level+'"][data-idx="'+idx+'"]')) return;
      renderAdmin();
    }, 700);
  } else {
    // Si el ganador no cambió pero hay empate o nuevo estado, actualizar in-place
    const tied = score.a!=null && score.b!=null && Number(score.a)===Number(score.b);
    const penLine = root.querySelector('.br-pen-line');
    if(penLine) penLine.style.display = tied?'flex':'none';
  }
}

    if(!poW) return `<div class="br-row"><div class="br-match"><span class="tag">QF${i+1}</span>${d.name} (directo) vs <i style="color:var(--muted)">esperando PO</i></div><span style="color:var(--muted);font-size:12px">Define primero el playoff</span></div>`;
    return `<div class="br-row ${sel?'done':''}">
      <div class="br-match"><span class="tag">QF${i+1}</span>${d.name} (directo) vs ${poW.name} (PO)</div>
      ${scoreFields('qf', i, d.name, poW.name)}
    </div>`;
  }).join('');
  // SEMIS
  const sfRows=[0,1].map(k=>{
    const f=k===0?[0,1]:[2,3]; const t=_qfW(f[0]); const bm=_qfW(f[1]); const sel=BRACKET_RES.sf[k]||'';
    if(!t||!bm) return `<div class="br-row"><div class="br-match"><span class="tag">SF${k+1}</span>${t?t.name:'Ganador QF'+(f[0]+1)} vs ${bm?bm.name:'Ganador QF'+(f[1]+1)}</div><span style="color:var(--muted);font-size:12px">Faltan cuartos</span></div>`;
    return `<div class="br-row ${sel?'done':''}">
      <div class="br-match"><span class="tag">SF${k+1}</span>${t.name} vs ${bm.name}</div>
      ${scoreFields('sf', k, t.name, bm.name)}
    </div>`;
  }).join('');
  // FINAL
  const t1=_sfW(0), t2=_sfW(1); const finSel=BRACKET_RES.final||'';
  const finRow = (!t1||!t2)
    ? `<div class="br-row"><div class="br-match"><span class="tag">FINAL</span>${t1?t1.name:'Ganador SF1'} vs ${t2?t2.name:'Ganador SF2'}</div><span style="color:var(--muted);font-size:12px">Faltan semis</span></div>`
    : `<div class="br-row ${finSel?'done':''}">
      <div class="br-match"><span class="tag">FINAL</span>${t1.name} vs ${t2.name}</div>
      ${scoreFields('final', 0, t1.name, t2.name)}
    </div>`;
  document.getElementById('view-admin').innerHTML=`
    <div class="section-head" style="display:flex;align-items:flex-end;justify-content:space-between;gap:16px;flex-wrap:wrap"><div><h2>Admin</h2><div class="sub">Carga resultados, MVP y gol de la fecha</div></div>
    <button class="btn btn-ghost" style="font-size:13px;padding:9px 16px" onclick="logout()">🔓 Cerrar sesión</button></div>
    <div class="admin-note">💾 Todo se guarda automáticamente en este navegador. Usa <b>Exportar</b> / <b>Importar</b> para pasar los datos a otro dispositivo.</div>
    <div class="admin-actions">
      <button class="btn btn-light" onclick="exportData()">⬇ Exportar datos</button>
      <label class="btn btn-ghost" style="cursor:pointer">⬆ Importar datos<input type="file" accept="application/json" onchange="importData(this)" style="display:none"></label>
      <button class="btn btn-red" onclick="resetData()">🗑 Borrar todo</button>
    </div>
    <div class="card card-pad" style="margin-bottom:24px">
      <h3><span class="dot" style="background:var(--green)"></span>Resultados de partidos</h3>${matchInputs}
    </div>
    <div class="card card-pad" style="margin-bottom:24px">
      <h3><span class="dot" style="background:var(--gold)"></span>📅 Día y recreo de cada partido</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Escribe el día (ej. "Lunes 26") y elige el recreo. Se guarda solo y se ve en el Fixture.</p>
      ${schedRows}
    </div>
    <div class="card card-pad" style="margin-bottom:24px">
      <h3><span class="dot" style="background:var(--gold)"></span>MVP / Mejor jugador por partido</h3>${mvpRows}
    </div>
    <div class="card card-pad" style="margin-bottom:24px">
      <h3><span class="dot" style="background:var(--gold)"></span>⚽ Gol de la Fecha</h3>${golRows||'<p style="color:var(--muted)">Aún no hay fechas programadas.</p>'}
    </div>
    <div class="card card-pad" style="margin-bottom:24px">
      <h3><span class="dot" style="background:var(--gold)"></span>🏆 Eliminatorias — Marcar ganadores</h3>
      <p style="font-size:13px;color:var(--muted);margin-bottom:14px">Marca el ganador de cada partido. El cuadro avanza solo: al elegir un ganador de playoff aparece su cuarto, luego semis, y por último la final.</p>
      <div class="br-block">
        <h4>Play-off (5 al 12)</h4>${poRows}
      </div>
      <div class="br-block">
        <h4>Cuartos de Final</h4>${qfRows}
      </div>
      <div class="br-block">
        <h4>Semifinales</h4>${sfRows}
      </div>
      <div class="br-block">
        <h4>Final</h4>${finRow}
      </div>
    </div>
    <div class="card card-pad">
      <h3><span class="dot" style="background:var(--gold)"></span>📷 Publicaciones de Instagram</h3>
      <div style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap">
        <input type="text" id="instaInput" placeholder="Pega el enlace del post (https://www.instagram.com/p/...)" style="flex:1;min-width:240px;padding:11px 14px;border-radius:9px;border:1px solid var(--line2);background:var(--bg2);color:var(--ink);font-family:'Manrope';font-size:13px">
        <button class="btn btn-light" onclick="addInsta()">+ Agregar post</button>
      </div>
      ${instaAdminRows}
    </div>`;
}
function saveMatch(id){
  const gl=document.getElementById('gl-'+id).value,gv=document.getElementById('gv-'+id).value;
  if(gl===''||gv==='')delete RESULTS[id];else RESULTS[id]={golL:parseInt(gl),golV:parseInt(gv)};
  saveResults();event.target.textContent='✓';event.target.classList.add('saved');
  setTimeout(()=>{event.target.textContent='Guardar';event.target.classList.remove('saved')},1200);
}
function saveMvp(id,val){if(val==='')delete MVPS[id];else MVPS[id]=val;saveMvps();event.target.closest('.mvp-admin-row').classList.toggle('has-mvp',val!=='')}
function saveGolFecha(fecha,val){if(val==='')delete GOLFECHA[fecha];else GOLFECHA[fecha]=val;saveGol();event.target.closest('.mvp-admin-row').classList.toggle('has-mvp',val!=='')}
function saveSched(id){
  const dia=(document.getElementById('dia-'+id).value||'').trim();
  const rec=document.getElementById('rec-'+id).value;
  if(!dia && !rec){ delete SCHEDULE[id]; }
  else { SCHEDULE[id]={dia:dia, recreo:rec}; }
  saveSchedule();
}
function addInsta(){
  const inp=document.getElementById('instaInput');
  let url=(inp.value||'').trim();
  if(!url){ alert('Pega el enlace de un post de Instagram.'); return; }
  if(!/instagram\.com\/(p|reel|tv)\//.test(url)){ alert('Ese enlace no parece un post de Instagram.\nDebe verse como: https://www.instagram.com/p/CODIGO/'); return; }
  url=normalizeInstaUrl(url);
  if(!Array.isArray(INSTAPOSTS)) INSTAPOSTS=[];
  if(INSTAPOSTS.includes(url)){ alert('Ese post ya está agregado.'); return; }
  INSTAPOSTS.unshift(url); // el más nuevo primero
  saveInsta();
  renderAdmin();
}
function removeInsta(i){
  if(!confirm('¿Quitar este post de la galería?')) return;
  INSTAPOSTS.splice(i,1);
  saveInsta();
  renderAdmin();
}

function openTeam(nombre){
  const eq=getEq(nombre);
  const partidos=DATA.fixture.filter(m=>m.local===nombre||m.visitante===nombre);
  const rosterHtml=eq.plantel.map(j=>`<div class="roster-row"><div class="rn">${j.d}</div><div><div class="nick">${j.a||j.n}</div><div class="full">${j.n}</div></div><div class="rg">${j.g}°</div></div>`).join('');
  const matchesHtml=partidos.map(m=>{
    const rival=m.local===nombre?m.visitante:m.local;const r=RESULTS[m.id];let result='VS';
    if(jugado(m.id)){const gp=m.local===nombre?r.golL:r.golV;const gr=m.local===nombre?r.golV:r.golL;result=`${gp} - ${gr}`}
    const meta=m.inaugural?'⭐ Inaugural':(m.fecha?`F${m.fecha} · ${diaDe(m)||'—'}`:'Por programar');
    return `<div class="modal-match"><div class="mm-rival"><span style="font-size:20px">${bandera(rival)}</span> ${rival.toUpperCase()}</div><div style="text-align:center"><div class="mm-result">${result}</div><div class="mm-when">${meta}</div></div></div>`;
  }).join('');
  document.getElementById('modalContent').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header" style="--tc:${eq.color}">
      <div class="flag">${eq.bandera}</div><h2>${eq.nombre.toUpperCase()}</h2><div class="cap">CAPITÁN · ${eq.capitan.toUpperCase()}</div>
    </div>
    <div class="modal-body" style="--tc:${eq.color}"><h3>Plantel · ${eq.plantel.length} jugadores</h3>${rosterHtml}<h3>Partidos</h3>${matchesHtml}</div>`;
  document.getElementById('modalOverlay').classList.add('show');
}
function openMatch(id){
  const m=DATA.fixture.find(x=>x.id===id);if(!m)return;
  const r=RESULTS[id],done=jugado(id);
  let mvpHtml='';
  if(MVPS[id]){const[en,jn]=MVPS[id].split('|');const eq=getEq(en);const jug=eq?eq.plantel.find(j=>j.n===jn):null;
    if(jug)mvpHtml=`<h3 style="color:var(--gold)">★ MVP del Partido</h3><div class="roster-row" style="--tc:${eq.color}"><div class="rn">${jug.d}</div><div><div class="nick">${jug.a||jug.n}</div><div class="full">${jug.n} · ${eq.bandera} ${eq.nombre}</div></div><div class="rg">${jug.g}°</div></div>`;}
  document.getElementById('modalContent').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-header">
      <div style="text-align:center;padding:8px 0">
        <div style="display:flex;align-items:center;justify-content:center;gap:18px">
          <div style="text-align:center"><div style="font-size:46px">${bandera(m.local)}</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:18px;margin-top:6px">${m.local.toUpperCase()}</div></div>
          <div style="font-family:'Barlow Condensed';font-weight:800;font-size:38px;color:var(--gold)">${done?`${r.golL} - ${r.golV}`:'VS'}</div>
          <div style="text-align:center"><div style="font-size:46px">${bandera(m.visitante)}</div><div style="font-family:'Barlow Condensed';font-weight:800;font-size:18px;margin-top:6px">${m.visitante.toUpperCase()}</div></div>
        </div>
        <div style="font-family:'JetBrains Mono';font-size:10px;color:var(--muted);margin-top:14px;letter-spacing:.1em">${m.inaugural?'⭐ PARTIDO INAUGURAL':(m.fecha?`FECHA ${m.fecha} · ${(diaDe(m)||'POR PROGRAMAR').toUpperCase()}${recreoDe(m)?' · '+recreoDe(m).toUpperCase():''}`:'POR PROGRAMAR')}</div>
      </div>
    </div>
    <div class="modal-body">${mvpHtml||'<p style="color:var(--muted);text-align:center;padding:20px">Sin MVP asignado todavía.</p>'}</div>`;
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show')}
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target.id==='modalOverlay')closeModal()});

const C = {
  BG:"#0a0e14", PANEL:"#141a25", WIN_BG:"#10182a", BORDER:"#26334a", BORDER_HI:"#33486a",
  GOLD:"#c9a227", GOLD_SOFT:"#e0bb45", TEXT:"#e8eef5", TEXT_DIM:"#8aa0bd", BLUE_TEXT:"#6b9bd1"
};
const W=1820, H=1120, BOX_W=280, ROW_H=46, FLAG_W=34, FLAG_H=25;
const PO_X=50, QF_X=480, SF_X=910, FIN_X=1310, CHAMP_X=1630, CHAMP_W=160;

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function buildBracketSVG(data){
  const e=[];
  const text=(x,y,s,o={})=>{const{size=16,fill=C.TEXT,weight="400",anchor="start",spacing=null}=o;
    const sp=spacing?` letter-spacing="${spacing}"`:"";
    e.push(`<text x="${x}" y="${y}" font-family="'Segoe UI',system-ui,'DejaVu Sans',sans-serif" font-size="${size}" font-weight="${weight}" fill="${fill}" text-anchor="${anchor}"${sp}>${esc(s)}</text>`);};
  const rounded=(x,y,w,h,fill,stroke=C.BORDER,sw=1.5,rx=10)=>e.push(`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="${rx}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`);
  const flag=(x,cy,code)=>{const fy=cy-FLAG_H/2; const href=FLAGS_BR[code]||"";
    e.push(`<image x="${x}" y="${fy}" width="${FLAG_W}" height="${FLAG_H}" preserveAspectRatio="xMidYMid slice" href="${href}"/>`);
    e.push(`<rect x="${x}" y="${fy}" width="${FLAG_W}" height="${FLAG_H}" rx="2.5" fill="none" stroke="#000" stroke-opacity="0.35" stroke-width="1"/>`);};
  const teamRow=(x,cy,t,opts={})=>{
    const {direct=false, score=null, scoreWin=false, pen=null} = opts;
    if(direct) e.push(`<rect x="${x+2}" y="${cy-ROW_H/2+4}" width="4" height="${ROW_H-8}" rx="2" fill="${C.GOLD}"/>`);
    text(x+22,cy+5,t.seed,{size:13,fill:direct?C.GOLD:C.BLUE_TEXT,weight:"700",anchor:"middle"});
    flag(x+36,cy,t.flag);
    text(x+82,cy+6,t.name,{size:18,fill:C.TEXT,weight:direct?"600":"500"});
    // Si hay marcador, mostrarlo a la derecha (en lugar de "DIRECTO")
    if(score!==null && score!==undefined && score!==''){
      const fill = scoreWin?C.GOLD:C.TEXT;
      text(x+BOX_W-14,cy+6,String(score),{size:20,fill:fill,weight:"800",anchor:"end"});
      if(pen!==null && pen!==undefined && pen!=='') text(x+BOX_W-14,cy+19,"P:"+pen,{size:9,fill:C.GOLD_SOFT,weight:"700",anchor:"end"});
    } else if(direct){
      text(x+BOX_W-14,cy+5,"DIRECTO",{size:10,fill:C.GOLD,weight:"700",anchor:"end",spacing:"1.5"});
    }
  };
  const winnerRow=(x,cy,label,sub)=>{
    e.push(`<circle cx="${x+28}" cy="${cy}" r="14" fill="none" stroke="${C.BORDER}" stroke-width="2" stroke-dasharray="3 3"/>`);
    text(x+28,cy+5,"?",{size:16,fill:C.TEXT_DIM,weight:"700",anchor:"middle"});
    text(x+52,cy+2,label,{size:15,fill:C.BLUE_TEXT,weight:"600"});
    if(sub) text(x+52,cy+18,sub,{size:11.5,fill:C.TEXT_DIM});
  };
  const matchBox=(x,cy,winrow=false)=>{rounded(x,cy-ROW_H,BOX_W,2*ROW_H,winrow?C.WIN_BG:C.PANEL);
    e.push(`<line x1="${x+12}" y1="${cy}" x2="${x+BOX_W-12}" y2="${cy}" stroke="${C.BORDER}" stroke-width="1"/>`);};
  const conn=(x1,y1,x2,y2,midx,color=C.BORDER_HI)=>e.push(`<path d="M ${x1} ${y1} H ${midx} V ${y2} H ${x2}" fill="none" stroke="${color}" stroke-width="2"/>`);
  const textRow=(x,cy,s,fill)=>text(x+24,cy+6,s,{size:16,fill,weight:"600"});

  // ---- resolution helpers ----
  const poWin=i=>{const p=data.playoffs[i]; return p.winner==='a'?p.a : p.winner==='b'?p.b : null;};
  const qfWin=i=>{const q=data.qf[i]; if(!q||!q.winner)return null; return q.winner==='direct'?data.directos[i] : q.winner==='po'?poWin(i) : null;};
  const sfWin=k=>{const s=data.sf[k]; if(!s||!s.winner)return null; const f=k===0?[0,1]:[2,3];
    return s.winner==='top'?qfWin(f[0]) : s.winner==='bottom'?qfWin(f[1]) : null;};
  const finWin=()=>{const f=data.final; if(!f||!f.winner)return null; return f.winner==='sf1'?sfWin(0) : f.winner==='sf2'?sfWin(1) : null;};

  const po_cy=[310,530,750,970], qf_cy=[310,530,750,970], sf_cy=[420,860], fin_cy=640;

  // ---- background + header ----
  e.push(`<rect width="${W}" height="${H}" fill="${C.BG}"/>`);
  e.push(`<rect width="${W}" height="6" fill="${C.GOLD}"/>`);
  e.push(`<circle cx="78" cy="74" r="30" fill="none" stroke="${C.GOLD}" stroke-width="2.5"/>`);
  text(78,82,"33",{size:22,fill:C.GOLD,weight:"700",anchor:"middle"});
  text(124,64,"INTERCOLLERAS",{size:34,fill:C.TEXT,weight:"700",spacing:"2"});
  text(126,92,"PROM XXXIII  ·  FASE FINAL",{size:15,fill:C.BLUE_TEXT,weight:"500",spacing:"3"});
  text(W-50,56,"CUADRO DE ELIMINATORIAS",{size:18,fill:C.GOLD_SOFT,weight:"700",anchor:"end",spacing:"1"});
  text(W-50,80,"1\u20134 clasifican directo a cuartos  \u00b7  5\u201312 juegan play-off (partido \u00fanico)",{size:12.5,fill:C.TEXT_DIM,anchor:"end"});
  e.push(`<line x1="50" y1="118" x2="${W-50}" y2="118" stroke="${C.BORDER}" stroke-width="1.5"/>`);
  [[PO_X,"PLAY-OFF"],[QF_X,"CUARTOS DE FINAL"],[SF_X,"SEMIFINALES"],[FIN_X,"FINAL"]]
    .forEach(([x,l])=>text(x,168,l,{size:15,fill:C.GOLD,weight:"700",spacing:"2"}));

  // ---- connectors ----
  const m_pq=(PO_X+BOX_W+QF_X)/2;
  for(let i=0;i<4;i++) conn(PO_X+BOX_W,po_cy[i],QF_X,qf_cy[i]+ROW_H/2,m_pq);
  const m_qs=(QF_X+BOX_W+SF_X)/2;
  conn(QF_X+BOX_W,qf_cy[0],SF_X,sf_cy[0]-ROW_H/2,m_qs);
  conn(QF_X+BOX_W,qf_cy[1],SF_X,sf_cy[0]+ROW_H/2,m_qs);
  conn(QF_X+BOX_W,qf_cy[2],SF_X,sf_cy[1]-ROW_H/2,m_qs);
  conn(QF_X+BOX_W,qf_cy[3],SF_X,sf_cy[1]+ROW_H/2,m_qs);
  const m_sf=(SF_X+BOX_W+FIN_X)/2;
  conn(SF_X+BOX_W,sf_cy[0],FIN_X,fin_cy-ROW_H/2,m_sf);
  conn(SF_X+BOX_W,sf_cy[1],FIN_X,fin_cy+ROW_H/2,m_sf);
  e.push(`<path d="M ${FIN_X+BOX_W} ${fin_cy} H ${CHAMP_X}" fill="none" stroke="${C.GOLD}" stroke-width="2"/>`);

  // ---- play-offs ----
  data.playoffs.forEach((p,i)=>{const cy=po_cy[i]; matchBox(PO_X,cy);
    e.push(`<rect x="${PO_X+BOX_W-58}" y="${cy-ROW_H-12}" width="50" height="20" rx="10" fill="none" stroke="${C.BORDER_HI}" stroke-width="1.5"/>`);
    text(PO_X+BOX_W-33,cy-ROW_H+2,p.tag,{size:11,fill:C.BLUE_TEXT,weight:"700",anchor:"middle",spacing:"1"});
    const wa=p.winner==='a', wb=p.winner==='b';
    const sc = p.score || {};
    teamRow(PO_X,cy-ROW_H/2,p.a,{score:sc.a, scoreWin:wa, pen:p.byPens?sc.penA:null});
    teamRow(PO_X,cy+ROW_H/2,p.b,{score:sc.b, scoreWin:wb, pen:p.byPens?sc.penB:null});
  });

  // ---- quarterfinals ----
  const sub=["(8 vs 9)","(5 vs 12)","(6 vs 11)","(7 vs 10)"];
  data.directos.forEach((d,i)=>{const cy=qf_cy[i]; matchBox(QF_X,cy);
    text(QF_X,cy-ROW_H-10,"QF"+(i+1),{size:12,fill:C.TEXT_DIM,weight:"700",spacing:"1"});
    const qfd = data.qf[i] || {};
    const sc = qfd.score || {};
    const wDir = qfd.winner==='direct', wPo = qfd.winner==='po';
    // Si hay marcador, el QF se mostrará así. Si no, mantener "DIRECTO"
    const hasScore = sc.a!=null || sc.b!=null;
    teamRow(QF_X,cy-ROW_H/2,d,{direct:true, score:hasScore?sc.a:null, scoreWin:wDir, pen:qfd.byPens?sc.penA:null});
    const w=poWin(i);
    if(w) teamRow(QF_X,cy+ROW_H/2,w,{score:hasScore?sc.b:null, scoreWin:wPo, pen:qfd.byPens?sc.penB:null});
    else winnerRow(QF_X,cy+ROW_H/2,"Ganador "+data.playoffs[i].tag,sub[i]);
  });

  // ---- semifinals ----
  const sfFeed=[[0,1],[2,3]];
  for(let k=0;k<2;k++){const cy=sf_cy[k]; matchBox(SF_X,cy,true);
    text(SF_X,cy-ROW_H-10,"SF"+(k+1),{size:12,fill:C.TEXT_DIM,weight:"700",spacing:"1"});
    const sfd = data.sf[k] || {};
    const sc = sfd.score || {};
    const hasScore = sc.a!=null || sc.b!=null;
    const wTop = sfd.winner==='top', wBot = sfd.winner==='bottom';
    [-1,1].forEach((sgn,j)=>{
      const ry=cy+sgn*ROW_H/2; const w=qfWin(sfFeed[k][j]);
      const sVal = hasScore ? (j===0?sc.a:sc.b) : null;
      const pVal = sfd.byPens ? (j===0?sc.penA:sc.penB) : null;
      const sWin = j===0?wTop:wBot;
      if(w) teamRow(SF_X,ry,w,{score:sVal, scoreWin:sWin, pen:pVal});
      else textRow(SF_X,ry,"Ganador QF"+(sfFeed[k][j]+1),C.BLUE_TEXT);
    });
  }

  // ---- final ----
  matchBox(FIN_X,fin_cy,true);
  text(FIN_X,fin_cy-ROW_H-10,"FINAL",{size:12,fill:C.GOLD,weight:"700",spacing:"1"});
  const fd = data.final || {};
  const fsc = fd.score || {};
  const fHasScore = fsc.a!=null || fsc.b!=null;
  const fwTop = fd.winner==='sf1', fwBot = fd.winner==='sf2';
  [0,1].forEach(k=>{
    const ry=fin_cy+(k?1:-1)*ROW_H/2; const w=sfWin(k);
    const sVal = fHasScore ? (k===0?fsc.a:fsc.b) : null;
    const pVal = fd.byPens ? (k===0?fsc.penA:fsc.penB) : null;
    const sWin = k===0?fwTop:fwBot;
    if(w) teamRow(FIN_X,ry,w,{score:sVal, scoreWin:sWin, pen:pVal});
    else textRow(FIN_X,ry,"Ganador SF"+(k+1),C.GOLD_SOFT);
  });

  // ---- champion ----
  rounded(CHAMP_X,fin_cy-40,CHAMP_W,80,"#1a1405",C.GOLD,2,12);
  e.push(`<text x="${CHAMP_X+CHAMP_W/2}" y="${fin_cy-26}" font-family="'DejaVu Sans'" font-size="20" fill="${C.GOLD}" text-anchor="middle" font-weight="700">\u2605</text>`);
  const champ=finWin();
  text(CHAMP_X+CHAMP_W/2,fin_cy-8,champ?champ.name:"CAMPE\u00d3N",{size:champ?16:15,fill:C.GOLD,weight:"700",anchor:"middle",spacing:champ?"0":"2"});
  text(CHAMP_X+CHAMP_W/2,fin_cy+22,"INTERCOLLERAS 33",{size:10,fill:C.TEXT_DIM,weight:"500",anchor:"middle",spacing:"1"});

  text(50,H-26,"Siembra est\u00e1ndar: el 1 enfrenta al play-off m\u00e1s d\u00e9bil (8v9) y el 4 al m\u00e1s fuerte (5v12). 1 y 2 solo se cruzan en la final.",{size:12.5,fill:C.TEXT_DIM});

  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" class="ic-bracket-svg">`+e.join("")+`</svg>`;
}


// Estructura fija del bracket (equipos definidos)
const BRACKET_DATA_BASE = {
  directos: [
    {seed:1, name:"Jamaica", flag:"jm"},      // -> QF1
    {seed:4, name:"Irán",    flag:"ir"},      // -> QF2
    {seed:3, name:"Escocia", flag:"gb-sct"},  // -> QF3
    {seed:2, name:"Croacia", flag:"hr"}       // -> QF4
  ],
  playoffs: [
    {tag:"PO-A", a:{seed:8,name:"Holanda",  flag:"nl"},     b:{seed:9, name:"Uruguay",   flag:"uy"},     winner:null},
    {tag:"PO-B", a:{seed:5,name:"Marruecos",flag:"ma"},     b:{seed:12,name:"Japón",     flag:"jp"},     winner:null},
    {tag:"PO-C", a:{seed:6,name:"Curazao",  flag:"cw"},     b:{seed:11,name:"Inglaterra",flag:"gb-eng"}, winner:null},
    {tag:"PO-D", a:{seed:7,name:"España",   flag:"es"},     b:{seed:10,name:"Senegal",   flag:"sn"},     winner:null}
  ],
  qf:    [{winner:null},{winner:null},{winner:null},{winner:null}],
  sf:    [{winner:null},{winner:null}],
  final: {winner:null}
};

// Mezcla los resultados (BRACKET_RES) sobre la plantilla y devuelve los datos al builder
function buildBracketData(){
  const d = JSON.parse(JSON.stringify(BRACKET_DATA_BASE));
  d.playoffs.forEach((p,i)=>{
    p.winner = BRACKET_RES.playoffs[i]||null;
    p.byPens = !!(BRACKET_PENS.playoffs && BRACKET_PENS.playoffs[i]);
    p.score = (BRACKET_SCORES.playoffs||[])[i] || null;
  });
  d.qf.forEach((q,i)=>{
    q.winner = BRACKET_RES.qf[i]||null;
    q.byPens = !!(BRACKET_PENS.qf && BRACKET_PENS.qf[i]);
    q.score = (BRACKET_SCORES.qf||[])[i] || null;
  });
  d.sf.forEach((s,k)=>{
    s.winner = BRACKET_RES.sf[k]||null;
    s.byPens = !!(BRACKET_PENS.sf && BRACKET_PENS.sf[k]);
    s.score = (BRACKET_SCORES.sf||[])[k] || null;
  });
  d.final.winner = BRACKET_RES.final||null;
  d.final.byPens = !!BRACKET_PENS.final;
  d.final.score = BRACKET_SCORES.final || null;
  return d;
}

function renderBracket(){
  const svg = buildBracketSVG(buildBracketData());
  document.getElementById('view-bracket').innerHTML = `
    <div class="section-head"><h2>Eliminatorias</h2><div class="sub">Cuadro final del torneo</div></div>
    <div class="ic-bracket-wrap">
      <div class="ic-bracket-scroll">${svg}</div>
      <div class="ic-bracket-hint">desliza horizontalmente para ver todo el cuadro →</div>
    </div>`;
}

// Guardar/cargar BRACKET_RES en Firebase
function saveBracket(){
  try{ localStorage.setItem('intercolleras_bracket_v1', JSON.stringify(BRACKET_RES)); }catch(e){}
  try{ localStorage.setItem('intercolleras_bracket_pens_v1', JSON.stringify(BRACKET_PENS)); }catch(e){}
  try{ localStorage.setItem('intercolleras_bracket_scores_v1', JSON.stringify(BRACKET_SCORES)); }catch(e){}
  pushFirebase();
}

// Acciones desde Admin
function setPlayoffWinner(i, val){ BRACKET_RES.playoffs[i] = val||null; saveBracket(); renderAdmin(); }
function setQfWinner(i, val){ BRACKET_RES.qf[i] = val||null; saveBracket(); renderAdmin(); }
function setSfWinner(k, val){ BRACKET_RES.sf[k] = val||null; saveBracket(); renderAdmin(); }
function setFinalWinner(val){ BRACKET_RES.final = val||null; saveBracket(); renderAdmin(); }
function togglePens(level, i, checked){
  if(level==='final'){ BRACKET_PENS.final = !!checked; }
  else { BRACKET_PENS[level][i] = !!checked; }
  saveBracket(); renderAdmin();
}

// Devuelve {winner:'a'|'b'|null, byPens:bool} a partir de {a,b,penA,penB}
function _scoreWinner(s){
  if(!s) return {winner:null, byPens:false};
  const ok = x => x!==null && x!==undefined && x!=='' && !isNaN(Number(x));
  if(!ok(s.a) || !ok(s.b)) return {winner:null, byPens:false};
  const a=Number(s.a), b=Number(s.b);
  if(a>b) return {winner:'a', byPens:false};
  if(b>a) return {winner:'b', byPens:false};
  // Empate → mira penales
  if(ok(s.penA) && ok(s.penB)){
    const pa=Number(s.penA), pb=Number(s.penB);
    if(pa>pb) return {winner:'a', byPens:true};
    if(pb>pa) return {winner:'b', byPens:true};
  }
  return {winner:null, byPens:false};
}

// Recorre todos los scores y actualiza RES + PENS
function recomputeWinners(){
  ['playoffs','sf'].forEach(level=>{
    (BRACKET_SCORES[level]||[]).forEach((s,i)=>{
      const r=_scoreWinner(s);
      BRACKET_RES[level][i] = level==='sf' ? (r.winner==='a'?'top':r.winner==='b'?'bottom':null) : r.winner;
      BRACKET_PENS[level][i] = r.byPens;
    });
  });
  (BRACKET_SCORES.qf||[]).forEach((s,i)=>{
    const r=_scoreWinner(s);
    BRACKET_RES.qf[i] = r.winner==='a' ? 'direct' : r.winner==='b' ? 'po' : null;
    BRACKET_PENS.qf[i] = r.byPens;
  });
  const fr=_scoreWinner(BRACKET_SCORES.final);
  BRACKET_RES.final = fr.winner==='a' ? 'sf1' : fr.winner==='b' ? 'sf2' : null;
  BRACKET_PENS.final = fr.byPens;
}

// Guarda el marcador y recalcula
function saveScore(level, idx, score){
  if(level==='final') BRACKET_SCORES.final = score;
  else { if(!Array.isArray(BRACKET_SCORES[level])) BRACKET_SCORES[level]=[]; BRACKET_SCORES[level][idx] = score; }
  recomputeWinners();
  saveBracket();
}

function switchView(view){
  // Proteger el panel admin con login
  if(view==='admin' && !isAdmin){
    openLogin();
    return;
  }
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+view).classList.add('active');
  document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.view===view));
  window.scrollTo({top:0,behavior:'smooth'});
  if(view==='dashboard')renderDashboard();if(view==='tabla')renderTabla();if(view==='fixture')renderFixture();
  if(view==='equipos')renderEquipos();if(view==='mvp')renderMvp();if(view==='bracket')renderBracket();if(view==='insta')renderInsta();if(view==='admin')renderAdmin();
}
document.getElementById('nav').addEventListener('click',e=>{if(e.target.dataset.view)switchView(e.target.dataset.view)});
(function init(){
  loadState();
  checkSession();
  initFirebase();
  renderDashboard();
  subscribeFirebase();
})();
</script>
